name: Feature request
description: Propose a new Orbit capability or workflow improvement.
title: 'feat: '
labels: ['type:task']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or operational gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, command, panel, or integration you want.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Primary surface
      options:
        - Health Monitor
        - Debug Recorder
        - A2A Explorer
        - MCP Explorer
        - Sessions or Tasks
        - Extension activation
        - CI, packaging, or release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note workarounds, rejected options, or related tools.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for similar requests.
          required: true
        - label: This request does not include secrets or private service data.
          required: true
