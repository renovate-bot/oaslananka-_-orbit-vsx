name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    if: github.repository_owner == 'oaslananka'
    name: Node ${{ matrix.node-version }} / VS Code ${{ matrix.vscode-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: '22'
            vscode-version: '1.100.0'
          - node-version: '24'
            vscode-version: stable
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Electron runtime dependencies
        run: sudo scripts/install-headless-deps.sh

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          corepack pnpm --version

      - run: corepack pnpm install --frozen-lockfile

      - run: corepack pnpm audit --audit-level moderate

      - name: Validate Renovate configuration
        if: matrix.node-version == '24'
        run: corepack pnpm run validate:renovate

      - name: Run complete verification chain
        env:
          ORBIT_TEST_ARTIFACTS_DIR: .orbit-test-artifacts/${{ matrix.node-version }}-${{ matrix.vscode-version }}
          ORBIT_VSCODE_TEST_VERSION: ${{ matrix.vscode-version }}
        run: corepack pnpm run verify:headless

      - name: Upload extension-host failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: orbit-ci-${{ matrix.node-version }}-${{ matrix.vscode-version }}-${{ github.run_id }}
          path: .orbit-test-artifacts
          if-no-files-found: ignore
          retention-days: 14
