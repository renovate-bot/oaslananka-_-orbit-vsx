name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    if: github.repository_owner == 'oaslananka'
    name: Node ${{ matrix.node-version }} / VS Code ${{ matrix.vscode-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: '22'
            vscode-version: '1.100.0'
          - node-version: '24'
            vscode-version: stable
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level moderate

      - name: Run complete verification chain
        env:
          ORBIT_VSCODE_TEST_VERSION: ${{ matrix.vscode-version }}
        run: pnpm run verify:headless
