name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: github.repository_owner == 'oaslananka'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Verify release tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tag must point to a commit on main"
            exit 1
          fi
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(jq -r '.version' package.json)"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Git tag version (${tag_version}) does not match package.json version (${pkg_version})"
            exit 1
          fi
          echo "Version check passed: ${tag_version} matches package.json"

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          corepack pnpm --version

      - run: corepack pnpm install --frozen-lockfile

      - run: corepack pnpm audit --audit-level moderate

      - name: Run complete verification chain
        run: xvfb-run -a corepack pnpm run verify

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: orbit-vsx.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate checksums
        run: sha256sum ./*.vsix orbit-vsx.spdx.json > SHA256SUMS.txt

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: corepack pnpm exec vsce publish --no-dependencies --skip-duplicate --packagePath ./*.vsix

      - name: Publish to OpenVSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: corepack pnpm exec ovsx publish --no-dependencies --skip-duplicate --packagePath ./*.vsix

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" ./*.vsix orbit-vsx.spdx.json SHA256SUMS.txt --clobber
          else
            gh release create "$GITHUB_REF_NAME" ./*.vsix orbit-vsx.spdx.json SHA256SUMS.txt --generate-notes --verify-tag
          fi
