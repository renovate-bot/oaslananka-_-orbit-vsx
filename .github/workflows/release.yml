name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Select Node.js 24 and enable pnpm
        shell: bash
        run: |
          set -euo pipefail
          node_dir="$(find /opt/hostedtoolcache/node -path '*/24.*/x64/bin' -type d | sort -V | tail -n 1)"
          if [ -z "$node_dir" ]; then
            echo "Node.js 24 was not found in /opt/hostedtoolcache/node" >&2
            exit 1
          fi
          echo "$node_dir" >> "$GITHUB_PATH"
          export PATH="$node_dir:$PATH"
          node --version
          corepack enable
          corepack prepare pnpm@11.3.0 --activate
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm run build:prod

      - name: Package VSIX
        run: pnpm exec vsce package --no-dependencies

      - name: Run packaged extension smoke test
        run: xvfb-run -a pnpm run smoke:package

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: orbit-vsx.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate checksums
        run: sha256sum ./*.vsix orbit-vsx.spdx.json > SHA256SUMS.txt

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            ./*.vsix
            orbit-vsx.spdx.json
            SHA256SUMS.txt

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --no-dependencies --packagePath ./*.vsix

      - name: Publish to OpenVSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm exec ovsx publish ./*.vsix --pat "$OVSX_PAT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ./*.vsix orbit-vsx.spdx.json SHA256SUMS.txt --generate-notes --verify-tag
